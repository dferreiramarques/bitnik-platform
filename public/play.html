<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bitnik — A jogar</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--panel:#141720;--border:#252a38;--text:#c8ccda;--muted:#5a607a;
  --accent:#4f7cff;--gold:#c8973a;--teal:#2a6b6e;--rust:#b84e2a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);
  min-height:100vh;font-size:13px}
#app{max-width:960px;margin:0 auto;padding:20px}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:14px;
  letter-spacing:2px;color:var(--gold);text-transform:uppercase;
  margin-bottom:24px;display:flex;align-items:center;gap:10px}
.logo a{color:inherit;text-decoration:none}
.logo span{color:var(--muted);font-weight:400;font-size:11px;letter-spacing:1px}

/* Screens */
.screen{display:none}.screen.active{display:block}

/* Name entry */
#s-name{max-width:400px;margin:80px auto;text-align:center}
#s-name h1{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:32px;
  margin-bottom:8px;letter-spacing:-1px}
#s-name p{color:var(--muted);font-size:12px;margin-bottom:32px}
.inp{width:100%;padding:14px;background:#141720;border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;
  font-size:14px;margin-bottom:12px;outline:none;text-align:center}
.inp:focus{border-color:var(--gold)}
.btn{padding:14px 28px;background:var(--gold);color:#0d0f14;
  font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:13px;
  letter-spacing:1.5px;text-transform:uppercase;border:none;
  border-radius:4px;cursor:pointer;width:100%;transition:background .2s}
.btn:hover{background:#d4a84a}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn.ghost:hover{border-color:var(--text);color:var(--text)}
.btn.teal{background:var(--teal);color:#fff}
.btn.teal:hover{background:#1f5558}

/* Lobby */
#s-lobby .card{background:var(--panel);border:1px solid var(--border);
  border-radius:6px;padding:20px;margin-bottom:12px}
.lobby-title{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:24px;
  margin-bottom:4px;letter-spacing:-0.5px}
.lobby-sub{font-size:11px;color:var(--muted);margin-bottom:20px}
.seat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.seat{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--bg);border:1px solid var(--border);border-radius:4px}
.seat-n{width:24px;height:24px;border-radius:50%;background:var(--border);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  flex-shrink:0}
.seat-name{flex:1;font-size:12px}
.seat.me .seat-n{background:var(--gold);color:#0d0f14}
.seat.me .seat-name{color:#fff}
.seat.empty .seat-name{color:var(--muted)}
.btn-row{display:flex;gap:8px}

/* Game */
#s-game{display:grid;grid-template-columns:1fr 280px;gap:16px}
.game-left{}
.game-right{}

.phase-bar{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--panel);border:1px solid var(--border);
  border-radius:6px;margin-bottom:12px}
.phase-tag{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
.phase-node{font-size:11px;color:var(--muted)}
.round-badge{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px}

.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:8px;margin-bottom:12px}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:12px 14px;transition:all .2s}
.pcard.active{border-color:var(--gold);background:#1a1e2a}
.pcard.me{border-color:var(--teal)}
.pname{font-size:12px;font-weight:500;color:#fff;margin-bottom:4px;
  display:flex;align-items:center;gap:6px}
.pname .you{font-size:9px;padding:1px 5px;background:rgba(42,107,110,.2);
  color:var(--teal);border-radius:2px}
.pname .cur{font-size:9px;padding:1px 5px;background:rgba(200,151,58,.2);
  color:var(--gold);border-radius:2px}
.pscore{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:28px;color:var(--gold)}

.action-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:16px;margin-bottom:12px}
.action-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px}
.action-btns{display:flex;flex-direction:column;gap:6px}
.action-btn{padding:10px 14px;background:var(--bg);border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-family:'DM Mono',monospace;
  font-size:12px;cursor:pointer;text-align:left;transition:all .15s;width:100%}
.action-btn:hover{border-color:var(--accent);color:#fff}
.action-btn.end{border-color:var(--teal);color:var(--teal)}
.action-btn.end:hover{background:rgba(42,107,110,.1)}
.waiting-msg{font-size:12px;color:var(--muted);font-style:italic;padding:8px 0}

.log-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:14px;max-height:300px;overflow-y:auto}
.log-card::-webkit-scrollbar{width:3px}
.log-card::-webkit-scrollbar-thumb{background:var(--border)}
.log-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px}
.log-entry{font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);
  color:var(--muted);line-height:1.5}
.log-entry:last-child{border:none}
.log-entry span{color:var(--text)}

/* Game over */
#s-over{max-width:480px;margin:60px auto}
#s-over .card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:28px}
.over-title{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:28px;
  margin-bottom:20px;letter-spacing:-0.5px}
.score-row{display:flex;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--border)}
.score-row:last-child{border:none}
.score-pos{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:20px;
  width:36px;color:var(--muted)}
.score-pos.gold{color:var(--gold)}
.score-name{flex:1;font-size:13px;color:#fff}
.score-pts{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:22px;color:var(--gold)}

/* Conn indicator */
#conn{position:fixed;top:12px;right:12px;width:8px;height:8px;border-radius:50%;
  background:var(--rust)}
#conn.ok{background:#4ade80}
</style>
</head>
<body>
<div id="conn"></div>
<div id="app">
  <div class="logo"><a href="/">Bitnik <span style="color:var(--gold)">Games</span></a> <span id="game-label">—</span></div>

  <!-- 1. Name entry -->
  <div class="screen active" id="s-name">
    <h1 id="name-title">A carregar…</h1>
    <p id="name-sub">Escolhe o teu nome para jogar</p>
    <input class="inp" id="inp-name" placeholder="O teu nome…" maxlength="20" autofocus>
    <button class="btn" onclick="joinGame()">Entrar →</button>
  </div>

  <!-- 2. Lobby -->
  <div class="screen" id="s-lobby">
    <div class="card">
      <div class="lobby-title" id="lob-title">—</div>
      <div class="lobby-sub" id="lob-sub">Aguarda que todos os jogadores entrem</div>
      <div class="seat-list" id="seat-list"></div>
      <div class="btn-row">
        <button class="btn teal" id="btn-start" onclick="startGame()">Iniciar jogo</button>
        <button class="btn ghost" onclick="location.href='/'">← Sair</button>
      </div>
    </div>
  </div>

  <!-- 3. Game -->
  <div class="screen" id="s-game">
    <div class="game-left">
      <div class="phase-bar">
        <div>
          <div class="phase-tag">Fase actual</div>
          <div class="phase-node" id="phase-node">—</div>
        </div>
        <div class="round-badge">Ronda <span id="round-n">1</span></div>
      </div>
      <div class="players-grid" id="players-grid"></div>
      <div class="action-card">
        <div class="action-title" id="action-title">A aguardar…</div>
        <div class="action-btns" id="action-btns"></div>
      </div>
    </div>
    <div class="game-right">
      <div class="log-card">
        <div class="log-title">Log</div>
        <div id="log-list"></div>
      </div>
    </div>
  </div>

  <!-- 4. Game over -->
  <div class="screen" id="s-over">
    <div class="card">
      <div class="over-title">🏆 Fim de jogo</div>
      <div id="final-list"></div>
      <button class="btn" style="margin-top:20px" onclick="location.href='/'">Voltar ao catálogo</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
const gameKey = location.pathname.replace('/play/','').split('/')[0];
let ws, myName='', mySeat=-1, state=null, lobbyInfo=null;
let bestTableNum = 1;  // track which table to join

// ── WebSocket ─────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen    = () => { document.getElementById('conn').classList.add('ok'); onOpen(); };
  ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch(err) { console.error(err); } };
  ws.onclose   = () => { document.getElementById('conn').classList.remove('ok'); setTimeout(connect, 2000); };
  ws.onerror   = () => {};
}
function send(msg) { if (ws?.readyState===1) ws.send(JSON.stringify(msg)); }

function onOpen() {
  send({ type:'LIST_LOBBIES', gameKey });
}

function handle(msg) {
  if (msg.type === 'WELCOME') {
    if (!msg.games || !msg.games.includes(gameKey)) {
      document.getElementById('name-title').textContent = 'Jogo não disponível';
      document.getElementById('name-sub').textContent = `"${gameKey}" não foi encontrado. Verifica o URL.`;
      document.querySelector('.btn').disabled = true;
      return;
    }
  }
  if (msg.type === 'LOBBIES') {
    // Find best available lobby
    const avail = (msg.lobbies || []).find(l =>
      l.gameKey === gameKey && !l.inGame && l.players < l.maxP
    ) || (msg.lobbies || []).find(l => l.gameKey === gameKey);

    if (avail) {
      bestTableNum = avail.tableNum || 1;
      const name = avail.gameName || gameKey;
      document.getElementById('game-label').textContent = name;
      document.getElementById('name-title').textContent = name;
      document.getElementById('name-sub').textContent = 'Escolhe o teu nome para entrar';
    } else {
      document.getElementById('name-title').textContent = gameKey;
      document.getElementById('name-sub').textContent = 'Escolhe o teu nome para entrar';
    }
  }
  if (msg.type === 'JOINED') {
    mySeat = msg.seat;
    show('s-lobby');
    send({ type:'REQUEST_STATE' });
  }
  if (msg.type === 'LOBBY_STATE') renderLobby(msg);
  if (msg.type === 'PLAYER_JOINED') send({ type:'REQUEST_STATE' });
  if (msg.type === 'GAME_STATE') renderGame(msg.state);
  if (msg.type === 'ERROR') {
    // Show error inline, don't just alert
    const sub = document.getElementById('name-sub');
    if (sub) sub.textContent = '⚠ ' + msg.text;
    console.error('Server error:', msg.text);
  }
}

function joinGame() {
  const n = document.getElementById('inp-name').value.trim();
  if (!n) { document.getElementById('inp-name').focus(); return; }
  myName = n;
  send({ type:'JOIN', gameKey, tableNum: bestTableNum, name: n });
}

function startGame() { send({ type:'START' }); }

// ── Lobby ─────────────────────────────────────────────────────────
function renderLobby(msg) {
  const l = msg.lobby;
  document.getElementById('lob-title').textContent = l.gameName || l.gameKey;
  document.getElementById('lob-sub').textContent =
    `Mesa ${l.tableNum || 1} · ${l.players}/${l.maxP} jogadores`;
  const names = msg.names || [];
  document.getElementById('seat-list').innerHTML = Array.from({length: l.maxP}, (_,i) => {
    const name = names[i];
    const isMe = i === msg.seat;
    const cls  = isMe ? 'me' : (name ? '' : 'empty');
    return `<div class="seat ${cls}">
      <div class="seat-n">${i+1}</div>
      <div class="seat-name">${name || (isMe ? myName : '(vazio)')}</div>
      ${isMe ? '<span style="font-size:10px;color:var(--gold)">tu</span>' : ''}
    </div>`;
  }).join('');
  document.getElementById('btn-start').textContent =
    l.players >= 2 ? 'Iniciar jogo' : `Aguarda ${2 - l.players} jogador(es)`;
}

// ── Game ──────────────────────────────────────────────────────────
function renderGame(s) {
  state = s;
  if (s.finalScores) { showOver(s); return; }
  show('s-game');

  document.getElementById('phase-node').textContent = s.currentNode || s.phase;
  document.getElementById('round-n').textContent = s.roundNum;

  // Players
  document.getElementById('players-grid').innerHTML = (s.players||[]).map(p => `
    <div class="pcard ${p.idx===s.myIdx?'me':''} ${p.isActive?'active':''}">
      <div class="pname">
        ${p.name}
        ${p.idx===s.myIdx ? '<span class="you">tu</span>' : ''}
        ${p.isActive ? '<span class="cur">vez</span>' : ''}
      </div>
      <div class="pscore">${p.score}</div>
    </div>
  `).join('');

  // Actions
  const pending = s.pendingAction;
  const btns  = document.getElementById('action-btns');
  const title = document.getElementById('action-title');
  btns.innerHTML = '';

  if (!pending) {
    title.textContent = 'A processar…';
  } else if (pending.type === 'WAITING') {
    title.textContent = 'À espera de outros jogadores…';
    const p = s.players.find(pl => pl.idx === pending.for || (Array.isArray(pending.for) && pending.for[0] === pl.idx));
    if (p) btns.innerHTML = `<div class="waiting-msg">É a vez de ${p.name}</div>`;
  } else if (pending.type === 'CHOOSE_ACTION' && pending.playerIdx === s.myIdx) {
    title.textContent = 'O que queres fazer?';
    (pending.options||[]).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'action-btn';
      btn.textContent = opt;
      btn.onclick = () => send({ type:'PLAYER_ACT', payload:{ action:opt } });
      btns.appendChild(btn);
    });
    const end = document.createElement('button');
    end.className = 'action-btn end';
    end.textContent = '✓ Terminar turno';
    end.onclick = () => send({ type:'PLAYER_ACT', payload:{ endTurn:true } });
    btns.appendChild(end);
  } else if (pending.type === 'SIMULTANEOUS') {
    const mine = (pending.pending||[]).includes(s.myIdx);
    title.textContent = mine ? 'A tua vez de agir:' : 'À espera dos outros…';
    if (mine) {
      const btn = document.createElement('button');
      btn.className = 'action-btn teal'; btn.textContent = '✓ Confirmar';
      btn.onclick = () => send({ type:'PLAYER_ACT', payload:{ confirmed:true } });
      btns.appendChild(btn);
    }
  } else if (pending.type === 'TIE_BREAK') {
    title.textContent = `Tie Break — ${Math.max(0, Math.round((pending.deadline-Date.now())/1000))}s`;
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = 'Jogar carta / Passar';
    btn.onclick = () => send({ type:'PLAYER_ACT', payload:{ pass:true } });
    btns.appendChild(btn);
  } else {
    title.textContent = 'A aguardar…';
  }

  // Log
  document.getElementById('log-list').innerHTML = (s.log||[]).slice().reverse().map(e =>
    `<div class="log-entry">R${e.round} · <span>${e.action}</span> · ${e.detail}</div>`
  ).join('');
}

function showOver(s) {
  show('s-over');
  document.getElementById('final-list').innerHTML = (s.finalScores||[]).map((sc,i) => `
    <div class="score-row">
      <div class="score-pos ${i===0?'gold':'}">${i===0?'🥇':i+1+'.'}</div>
      <div class="score-name">${sc.name}</div>
      <div class="score-pts">${sc.score}</div>
    </div>
  `).join('');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Enter on name input
document.getElementById('inp-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinGame();
});

setInterval(() => { if (ws?.readyState===1) send({type:'PING'}); }, 20000);
connect();
</script>
</body>
</html>
